---
name: Build Hugo site

on:
  workflow_call:
    inputs:
      # inputs.path: ./
      path:
        default: ./
        description: '(String) Path to build the Hugo site from'
        required: false
        type: string

jobs:
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build with Hugo
        uses: docker://hugomods/hugo:std-go-git
        with:
          args: >
            sh -c "
                cd ${{ inputs.path }};
                [ -f go.mod ] || hugo mod init 'github.com/${{ github.repository }}';
                hugo mod get -u \
                && hugo \
                  --gc \
                  --minify
            "
      - name: Upload GitHub Pages artifacts
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: github-pages
          path: ${{ inputs.path }}/public
